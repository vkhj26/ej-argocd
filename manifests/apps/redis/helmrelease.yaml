apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-valeria
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.bitnami.com/bitnami'
    targetRevision: 18.x.x
    chart: redis
    helm:
      values: |
        image:
          registry: docker.io
          repository: bitnamilegacy/redis
          tag: latest
          pullPolicy: Always
        auth:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default