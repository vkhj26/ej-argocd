apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-valeria
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.bitnami.com/bitnami'
    targetRevision: 16.x # Versión más reciente del chart
    chart: nginx
    helm:
      values: |
        image:
          tag: latest
        staticSiteConfig:
          enabled: true
          content: "<h1>¡Hola Valeria!</h1><p>Desplegado con ArgoCD y Helm.</p>"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default